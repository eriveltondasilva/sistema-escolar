<!doctype html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-50 text-slate-800 font-sans antialiased">
    <main class="p-5 h-full flex flex-col justify-between">
      <div class="space-y-4">
        <header
          class="flex items-start space-x-3 text-emerald-600 bg-emerald-50 border border-emerald-200 p-3 rounded-md"
        >
          <svg
            class="w-5 h-5 shrink-0 mt-0.5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            ></path>
          </svg>
          <div class="text-sm">
            <p class="font-semibold text-emerald-900">
              <?= successCount ?> boletim(ns) gerado(s) com sucesso
            </p>
            <p class="text-emerald-700">
              Turma: <?= className ?> ( <?= schoolYearLabel ?> )
            </p>
          </div>
        </header>

        <? if (errors.length > 0) { ?>
        <div class="bg-red-50 border border-red-200 p-3 rounded-md space-y-2">
          <div class="flex items-center space-x-2 text-red-600">
            <svg
              class="w-5 h-5 shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              ></path>
            </svg>
            <h2 class="text-sm font-semibold text-red-900">
              <?= errors.length ?> erro(s) encontrado(s):
            </h2>
          </div>

          <ul
            class="max-h-[160px] overflow-y-auto text-xs text-red-700 bg-white p-2 rounded border border-red-100 divide-y divide-red-50"
          >
            <? errors.forEach(function (error) { ?>
            <li
              class="py-1 first:pt-0 last:pb-0 list-none text-red-600 font-mono break-words"
            >
              <?= error ?>
            </li>
            <? }); ?>
          </ul>

          <? if (truncatedCount > 0) { ?>
          <p class="text-xs italic text-red-500 pt-1">
            ... e mais <?= truncatedCount ?> erro(s) não exibido(s) aqui.
          </p>
          <? } ?>
        </div>
        <? } ?>

        <div class="pt-2">
          <a
            href="<?= pdfFolderUrl ?>"
            target="_blank"
            class="inline-flex items-center justify-center w-full px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors"
          >
            Abrir pasta no Drive
          </a>
        </div>
      </div>

      <footer class="mt-6 pt-4 border-t border-slate-200">
        <button
          onclick="google.script.host.close()"
          class="w-full px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md shadow-sm hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors"
        >
          Fechar
        </button>
      </footer>
    </main>
  </body>
</html>

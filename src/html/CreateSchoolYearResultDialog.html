<!doctype html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <main
      class="flex h-full flex-col justify-between bg-slate-50 p-5 font-sans text-slate-800 antialiased"
    >
      <div class="space-y-4">
        <!-- Cabeçalho de sucesso -->
        <header
          class="flex items-start space-x-3 rounded-md border border-emerald-200 bg-emerald-50 p-3 text-emerald-600"
        >
          <svg
            class="mt-0.5 h-5 w-5 shrink-0"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          <div class="text-sm">
            <p class="font-semibold text-emerald-900">Ano letivo criado com sucesso!</p>
            <p class="text-emerald-700"><?= schoolYearLabel ?></p>
          </div>
        </header>

        <!-- Turmas criadas -->
        <div class="rounded-md border border-slate-200 bg-white p-3 shadow-sm">
          <p class="mb-2 text-xs font-medium tracking-wider text-slate-500 uppercase">
            <?= createdClasses.length ?> turma(s) criada(s)
          </p>
          <div class="flex flex-wrap gap-1.5">
            <? createdClasses.forEach(function(cls) { ?>
            <span
              class="inline-flex items-center rounded-md bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-700"
            >
              <?= cls ?>
            </span>
            <? }); ?>
          </div>
        </div>

        <!-- Ação -->
        <a
          href="<?= folderUrl ?>"
          target="_blank"
          class="inline-flex w-full items-center justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition-colors hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:outline-none"
        >
          Abrir pasta no Drive
        </a>
      </div>

      <footer class="mt-5 border-t border-slate-200 pt-4">
        <button
          onclick="google.script.host.close()"
          class="w-full rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm transition-colors hover:bg-slate-50 focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 focus:outline-none"
        >
          Fechar
        </button>
      </footer>
    </main>
  </body>
</html>

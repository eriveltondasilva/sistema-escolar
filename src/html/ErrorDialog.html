<!doctype html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-slate-50 text-slate-800 font-sans antialiased h-screen flex items-center justify-center p-4"
  >
    <main
      class="max-w-sm w-full bg-white rounded-lg shadow-sm border border-red-100 p-6 text-center"
    >
      <div
        class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-red-50 text-red-600 mb-4"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          ></path>
        </svg>
      </div>

      <h1 class="text-lg font-semibold text-slate-900 mb-2">
        Ops! Algo deu errado
      </h1>
      <p class="text-sm text-slate-600 mb-6"><?= errorMessage ?></p>

      <button
        onclick="window.close()"
        class="w-full px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50 transition-colors"
      >
        Fechar
      </button>
    </main>
  </body>
</html>

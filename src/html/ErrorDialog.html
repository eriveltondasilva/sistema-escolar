<!doctype html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="flex h-screen items-center justify-center bg-slate-50 p-4 font-sans text-slate-800 antialiased"
  >
    <main
      class="w-full max-w-sm rounded-lg border border-red-100 bg-white p-6 text-center shadow-sm"
    >
      <div
        class="mb-4 inline-flex h-12 w-12 items-center justify-center rounded-full bg-red-50 text-red-600"
      >
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
      </div>

      <h1 class="mb-2 text-lg font-semibold text-slate-900">Ops! Algo deu errado</h1>
      <p class="mb-6 text-sm text-slate-600"><?= errorMessage ?></p>

      <button
        onclick="window.close()"
        class="w-full rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm transition-colors hover:bg-slate-50 focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 focus:outline-none"
      >
        Fechar
      </button>
    </main>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>

  <body class="h-full bg-slate-50 font-sans text-slate-900 antialiased">
    <script>
      const serverIssues = <?!= JSON.stringify(issues) ?>;
    </script>

    <div x-data="diagnosticPanel()" class="flex h-[500px] flex-col">
      <template x-if="issues.length === 0">
        <div class="flex flex-1 flex-col items-center justify-center space-y-4 p-6 text-center">
          <div
            class="mb-2 flex h-16 w-16 items-center justify-center rounded-full bg-emerald-100 text-emerald-600"
          >
            <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              ></path>
            </svg>
          </div>
          <h2 class="text-xl font-bold text-slate-800">Tudo Certo!</h2>
          <p class="max-w-xs text-sm text-slate-500">
            A estrutura de pastas, planilhas, disciplinas e o cadastro de alunos foram validados sem
            nenhum problema.
          </p>
        </div>
      </template>

      <template x-if="issues.length > 0">
        <div class="flex h-full flex-col">
          <div class="shrink-0 border-b border-slate-200 bg-white p-4">
            <h2 class="mb-3 text-lg font-semibold tracking-tight">Resultados da Verificação</h2>

            <div class="flex space-x-2 rounded-lg bg-slate-100 p-1">
              <button
                @click="filter = 'all'"
                :class="filter === 'all' ? 'bg-white shadow text-slate-900' : 'text-slate-600 hover:text-slate-900'"
                class="flex-1 rounded-md py-1.5 text-xs font-medium transition-all focus:ring-2 focus:ring-slate-400 focus:outline-none focus:ring-inset"
              >
                Todos (<span x-text="issues.length"></span>)
              </button>
              <button
                @click="filter = 'error'"
                :class="filter === 'error' ? 'bg-white shadow text-red-700' : 'text-slate-600 hover:text-slate-900'"
                class="flex-1 rounded-md py-1.5 text-xs font-medium transition-all focus:ring-2 focus:ring-slate-400 focus:outline-none focus:ring-inset"
              >
                Erros (<span x-text="errorCount"></span>)
              </button>
              <button
                @click="filter = 'warning'"
                :class="filter === 'warning' ? 'bg-white shadow text-amber-700' : 'text-slate-600 hover:text-slate-900'"
                class="flex-1 rounded-md py-1.5 text-xs font-medium transition-all focus:ring-2 focus:ring-slate-400 focus:outline-none focus:ring-inset"
              >
                Avisos (<span x-text="warningCount"></span>)
              </button>
            </div>
          </div>

          <div class="flex-1 space-y-3 overflow-y-auto p-4">
            <template x-for="(issue, index) in filteredIssues" :key="index">
              <div
                :class="issue.type === 'error' ? 'bg-red-50 border-red-200' : 'bg-amber-50 border-amber-200'"
                class="flex items-start space-x-3 rounded-md border p-3 transition-colors"
              >
                <template x-if="issue.type === 'error'">
                  <svg
                    class="mt-0.5 h-5 w-5 shrink-0 text-red-600"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                    ></path>
                  </svg>
                </template>

                <template x-if="issue.type === 'warning'">
                  <svg
                    class="mt-0.5 h-5 w-5 shrink-0 text-amber-500"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                    ></path>
                  </svg>
                </template>

                <div class="min-w-0 flex-1">
                  <p
                    :class="issue.type === 'error' ? 'text-red-900' : 'text-amber-900'"
                    class="text-sm leading-snug text-wrap break-words"
                    x-text="issue.text"
                  ></p>

                  <template x-if="issue.url">
                    <a
                      :href="issue.url"
                      target="_blank"
                      :class="issue.type === 'error' ? 'text-red-700 hover:text-red-800' : 'text-amber-700 hover:text-amber-800'"
                      class="group mt-2 inline-flex items-center text-xs font-semibold focus:underline focus:outline-none"
                    >
                      Corrigir arquivo
                      <svg
                        class="ml-1 h-3 w-3 transition-transform group-hover:translate-x-0.5 group-hover:-translate-y-0.5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
                        ></path>
                      </svg>
                    </a>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <div class="shrink-0 border-t border-slate-200 bg-white p-4">
        <button
          onclick="google.script.host.close()"
          class="w-full rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm transition-colors hover:bg-slate-50 focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 focus:outline-none"
        >
          Fechar Janela
        </button>
      </div>
    </div>

    <script>
      function diagnosticPanel() {
        return {
          issues: serverIssues || [],
          filter: "all", // 'all' | 'error' | 'warning'

          get errorCount() {
            return this.issues.filter((i) => i.type === "error").length;
          },
          get warningCount() {
            return this.issues.filter((i) => i.type === "warning").length;
          },
          get filteredIssues() {
            if (this.filter === "all") return this.issues;
            return this.issues.filter((i) => i.type === this.filter);
          },
        };
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>

  <body class="bg-slate-50 text-slate-900 antialiased h-full">
    <script>
      const serverIssues = <?!= JSON.stringify(issues) ?>;
    </script>

    <div x-data="diagnosticPanel()" class="h-[500px] flex flex-col">
      <template x-if="issues.length === 0">
        <div
          class="flex-1 flex flex-col items-center justify-center p-6 text-center space-y-4"
        >
          <div
            class="h-16 w-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-2"
          >
            <svg
              class="w-8 h-8"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              ></path>
            </svg>
          </div>
          <h2 class="text-xl font-bold text-slate-800">Tudo Certo!</h2>
          <p class="text-sm text-slate-500 max-w-xs">
            A estrutura de pastas, planilhas, disciplinas e o cadastro de alunos
            foram validados sem nenhum problema.
          </p>
        </div>
      </template>

      <template x-if="issues.length > 0">
        <div class="flex flex-col h-full">
          <div class="p-4 bg-white border-b border-slate-200 shrink-0">
            <h2 class="text-lg font-semibold tracking-tight mb-3">
              Resultados da Verificação
            </h2>

            <div class="flex space-x-2 bg-slate-100 p-1 rounded-lg">
              <button
                @click="filter = 'all'"
                :class="filter === 'all' ? 'bg-white shadow text-slate-900' : 'text-slate-600 hover:text-slate-900'"
                class="flex-1 text-xs font-medium py-1.5 rounded-md transition-all"
              >
                Todos (<span x-text="issues.length"></span>)
              </button>
              <button
                @click="filter = 'error'"
                :class="filter === 'error' ? 'bg-white shadow text-red-700' : 'text-slate-600 hover:text-slate-900'"
                class="flex-1 text-xs font-medium py-1.5 rounded-md transition-all"
              >
                Erros (<span x-text="errorCount"></span>)
              </button>
              <button
                @click="filter = 'warning'"
                :class="filter === 'warning' ? 'bg-white shadow text-amber-700' : 'text-slate-600 hover:text-slate-900'"
                class="flex-1 text-xs font-medium py-1.5 rounded-md transition-all"
              >
                Avisos (<span x-text="warningCount"></span>)
              </button>
            </div>
          </div>

          <div class="flex-1 overflow-y-auto p-4 space-y-3">
            <template x-for="(issue, index) in filteredIssues" :key="index">
              <div
                :class="issue.type === 'error' ? 'bg-red-50 border-red-200' : 'bg-amber-50 border-amber-200'"
                class="p-3 rounded-md border flex items-start space-x-3 transition-colors"
              >
                <template x-if="issue.type === 'error'">
                  <svg
                    class="w-5 h-5 text-red-600 shrink-0 mt-0.5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                    ></path>
                  </svg>
                </template>

                <template x-if="issue.type === 'warning'">
                  <svg
                    class="w-5 h-5 text-amber-500 shrink-0 mt-0.5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                    ></path>
                  </svg>
                </template>

                <div class="flex-1 min-w-0">
                  <p
                    :class="issue.type === 'error' ? 'text-red-900' : 'text-amber-900'"
                    class="text-sm text-wrap break-words leading-snug"
                    x-text="issue.text"
                  ></p>

                  <template x-if="issue.url">
                    <a
                      :href="issue.url"
                      target="_blank"
                      :class="issue.type === 'error' ? 'text-red-700 hover:text-red-800' : 'text-amber-700 hover:text-amber-800'"
                      class="inline-flex items-center text-xs font-semibold mt-2 group"
                    >
                      Corrigir arquivo
                      <svg
                        class="w-3 h-3 ml-1 transition-transform group-hover:translate-x-0.5 group-hover:-translate-y-0.5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
                        ></path>
                      </svg>
                    </a>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <div class="p-4 border-t border-slate-200 bg-white shrink-0">
        <button
          onclick="google.script.host.close()"
          class="w-full inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors border border-slate-300 bg-white hover:bg-slate-50 px-4 py-2 text-slate-700 focus:outline-none"
        >
          Fechar Janela
        </button>
      </div>
    </div>

    <script>
      function diagnosticPanel() {
        return {
          issues: serverIssues || [],
          filter: "all", // 'all' | 'error' | 'warning'

          get errorCount() {
            return this.issues.filter((i) => i.type === "error").length;
          },
          get warningCount() {
            return this.issues.filter((i) => i.type === "warning").length;
          },
          get filteredIssues() {
            if (this.filter === "all") return this.issues;
            return this.issues.filter((i) => i.type === this.filter);
          },
        };
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>

  <body class="bg-white p-5 text-slate-900 antialiased">
    <div x-data="reportForm()" class="space-y-4">
      <div>
        <label class="mb-1 block text-xs font-medium tracking-wider text-slate-500 uppercase">
          Ano Letivo
        </label>
        <select
          x-model="schoolYear"
          :disabled="isLoading"
          @change="actionType === 'single' && fetchStudents()"
          class="w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm shadow-sm transition-all focus:border-slate-400 focus:ring-1 focus:ring-slate-400 focus:outline-none disabled:opacity-50"
        >
          <? for (const year of years) { ?>
          <option value="<?= year ?>"><?= year ?></option>
          <? } ?>
        </select>
      </div>

      <div>
        <label class="mb-1 block text-xs font-medium tracking-wider text-slate-500 uppercase">
          Turma
        </label>
        <select
          x-model="className"
          :disabled="isLoading"
          @change="actionType === 'single' && fetchStudents()"
          class="w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm shadow-sm transition-all focus:border-slate-400 focus:ring-1 focus:ring-slate-400 focus:outline-none disabled:opacity-50"
        >
          <? for (const cls of classes) { ?>
          <option value="<?= cls ?>"><?= cls ?></option>
          <? } ?>
        </select>
      </div>

      <!-- Campo de aluno — apenas no modo "single" -->
      <template x-if="actionType === 'single'">
        <div>
          <label
            class="mb-1 flex items-center text-xs font-medium tracking-wider text-slate-500 uppercase"
          >
            Aluno (Nome ou Matrícula)
            <span
              x-show="isFetchingStudents"
              class="ml-2 inline-block h-3 w-3 animate-spin rounded-full border-2 border-slate-300 border-t-slate-600"
            ></span>
          </label>

          <template x-if="!isFetchingStudents && availableStudents.length === 0">
            <p
              class="rounded-md border border-amber-200 bg-amber-50 p-2.5 text-xs font-medium text-amber-700"
            >
              Nenhum aluno cadastrado nesta turma.
            </p>
          </template>

          <template x-if="availableStudents.length > 0">
            <div>
              <input
                type="text"
                x-model="studentSearch"
                list="studentsList"
                :disabled="isLoading || isFetchingStudents"
                placeholder="Comece a digitar o nome do estudante..."
                class="w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm shadow-sm transition-all focus:border-slate-400 focus:ring-1 focus:ring-slate-400 focus:outline-none disabled:opacity-50"
              />
              <datalist id="studentsList">
                <template x-for="student in availableStudents" :key="student.studentId">
                  <option :value="student.studentId" x-text="student.name"></option>
                </template>
              </datalist>
            </div>
          </template>
        </div>
      </template>

      <div
        x-show="error"
        x-text="error"
        x-transition
        class="rounded-md border border-red-100 bg-red-50 p-2.5 text-xs font-medium text-red-600"
        style="display: none"
      ></div>

      <div class="flex items-center justify-end space-x-2 pt-2">
        <button
          @click="google.script.host.close()"
          :disabled="isLoading"
          class="inline-flex items-center justify-center rounded-md border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition-colors hover:bg-slate-50 focus:outline-none disabled:opacity-50"
        >
          Cancelar
        </button>
        <button
          @click="submit()"
          :disabled="isLoading || (actionType === 'single' && (isFetchingStudents || noStudents))"
          class="inline-flex items-center justify-center rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-slate-800 focus:outline-none disabled:cursor-not-allowed disabled:opacity-70"
        >
          <span x-text="isLoading ? 'Processando...' : 'Confirmar'"></span>
        </button>
      </div>
    </div>

    <script>
      function reportForm() {
        return {
          actionType: "<?= actionType ?>",
          schoolYear: "<?= years[0] ?>",
          className: "<?= classes[0] ?>",
          studentSearch: "",
          availableStudents: [],
          isLoading: false,
          isFetchingStudents: false,
          error: "",

          get noStudents() {
            return !this.isFetchingStudents && this.availableStudents.length === 0;
          },

          init() {
            if (this.actionType === "single") {
              this.fetchStudents();
            }
          },

          fetchStudents() {
            this.isFetchingStudents = true;
            this.availableStudents = [];
            this.studentSearch = "";
            this.error = "";

            google.script.run
              .withSuccessHandler((students) => {
                this.availableStudents = students;
                this.isFetchingStudents = false;
              })
              .withFailureHandler((err) => {
                this.error = "Erro ao buscar alunos: " + err.message;
                this.isFetchingStudents = false;
              })
              .getStudentsDataForClass(this.schoolYear, this.className);
          },

          submit() {
            this.error = "";
            this.isLoading = true;

            if (this.actionType === "single") {
              const selectedId = this.studentSearch.trim();
              if (!selectedId) {
                this.error = "Selecione ou digite uma matrícula válida.";
                this.isLoading = false;
                return;
              }

              google.script.run
                .withSuccessHandler(() => google.script.host.close())
                .withFailureHandler((err) => {
                  this.error = err.message;
                  this.isLoading = false;
                })
                .executeStudentReportGeneration(this.schoolYear, this.className, selectedId);
            } else {
              google.script.run
                .withSuccessHandler(() => google.script.host.close())
                .withFailureHandler((err) => {
                  this.error = err.message;
                  this.isLoading = false;
                })
                .executeClassReportsGeneration(this.schoolYear, this.className);
            }
          },
        };
      }
    </script>
  </body>
</html>
